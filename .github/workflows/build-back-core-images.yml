name: Build Back/Core Images

on:
  push:
    branches:
      - develop
    paths:
      - "backend/**"
      - "backend_admin/**"
      - "core/**"
      - "core_admin/**"
      - ".github/workflows/build-back-core-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: de-butler-kyvc

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            image: kyvc-backend
          - name: backend-admin
            context: ./backend_admin
            image: kyvc-backend-admin
          - name: core
            context: ./core
            image: kyvc-core
          - name: core-admin
            context: ./core_admin
            image: kyvc-core-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        shell: bash
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:dev-${{ steps.vars.outputs.short_sha }}
