name: Compose Deploy

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "infra/compose/dev/**"
      - "infra/compose/prod/**"
      - ".github/workflows/compose-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  REPO_DIR: /opt/kyvc/repo
  DEV_SOURCE_COMPOSE_FILE: /opt/kyvc/repo/infra/compose/dev/docker-compose.yml
  DEV_RUNTIME_COMPOSE_FILE: /opt/kyvc/compose/dev/docker-compose.yml
  PROD_SOURCE_COMPOSE_FILE: /opt/kyvc/repo/infra/compose/prod/docker-compose.yml
  PROD_RUNTIME_COMPOSE_FILE: /opt/kyvc/compose/prod/docker-compose.yml

jobs:
  detect-compose:
    runs-on: ubuntu-latest

    outputs:
      dev_changed: ${{ steps.changes.outputs.dev }}
      prod_changed: ${{ steps.changes.outputs.prod }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect compose changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dev:
              - 'infra/compose/dev/**'
            prod:
              - 'infra/compose/prod/**'

  deploy-dev:
    needs: detect-compose
    if: >-
      github.ref == 'refs/heads/develop' &&
      (github.event_name == 'workflow_dispatch' ||
       needs.detect-compose.outputs.dev_changed == 'true')
    runs-on: [self-hosted, kyvc, dev]

    steps:
      - name: Update repository
        run: |
          set -euo pipefail
          test -d "$REPO_DIR"
          cd "$REPO_DIR"
          git fetch origin
          git checkout develop
          git pull origin develop

      - name: Prepare dev runtime compose
        run: |
          set -euo pipefail
          mkdir -p /opt/kyvc/compose/dev
          cp "$DEV_SOURCE_COMPOSE_FILE" "$DEV_RUNTIME_COMPOSE_FILE"

      - name: Ensure Docker networks
        run: |
          set -euo pipefail
          docker network inspect kyvc-public >/dev/null 2>&1 || docker network create kyvc-public
          docker network inspect kyvc-internal >/dev/null 2>&1 || docker network create kyvc-internal
          docker network inspect kyvc-admin-internal >/dev/null 2>&1 || docker network create kyvc-admin-internal
          docker network inspect kyvc-db >/dev/null 2>&1 || docker network create kyvc-db

      - name: Ensure dev directories
        run: |
          set -euo pipefail
          mkdir -p /opt/kyvc/logs/dev/frontend
          mkdir -p /opt/kyvc/logs/dev/backend
          mkdir -p /opt/kyvc/logs/dev/core
          mkdir -p /opt/kyvc/logs/dev/back-admin
          mkdir -p /opt/kyvc/logs/dev/core-admin
          test -d /mnt/kyvc-dev

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy dev compose
        run: |
          set -euo pipefail
          docker compose \
            -f "$DEV_RUNTIME_COMPOSE_FILE" \
            pull
          docker compose \
            -f "$DEV_RUNTIME_COMPOSE_FILE" \
            up -d

      - name: Health check dev compose
        run: |
          set -euo pipefail
          curl -f -H "Host: dev-kyvc.khuoo.synology.me" http://127.0.0.1:3001
          curl -f -H "Host: dev-admin-kyvc.khuoo.synology.me" http://127.0.0.1:3001
          curl -f -H "Host: dev-core-admin-kyvc.khuoo.synology.me" http://127.0.0.1:3001
          curl -f http://127.0.0.1:8082/health
          docker exec kyvc-core-dev sh -c "wget -qO- http://127.0.0.1:8090/health"
          docker exec kyvc-back-admin-dev sh -c "wget -qO- http://127.0.0.1:8080/health"
          docker exec kyvc-core-admin-dev sh -c "wget -qO- http://127.0.0.1:8091/health"

  deploy-prod:
    needs: detect-compose
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' ||
       needs.detect-compose.outputs.prod_changed == 'true')
    runs-on: [self-hosted, kyvc, prod]

    steps:
      - name: Update repository
        run: |
          set -euo pipefail
          test -d "$REPO_DIR"
          cd "$REPO_DIR"
          git fetch origin
          git checkout main
          git pull origin main

      - name: Prepare prod runtime compose
        run: |
          set -euo pipefail
          mkdir -p /opt/kyvc/compose/prod
          cp "$PROD_SOURCE_COMPOSE_FILE" "$PROD_RUNTIME_COMPOSE_FILE"

      - name: Ensure Docker networks
        run: |
          set -euo pipefail
          docker network inspect kyvc-public >/dev/null 2>&1 || docker network create kyvc-public
          docker network inspect kyvc-internal >/dev/null 2>&1 || docker network create kyvc-internal
          docker network inspect kyvc-admin-internal >/dev/null 2>&1 || docker network create kyvc-admin-internal
          docker network inspect kyvc-db >/dev/null 2>&1 || docker network create kyvc-db

      - name: Ensure prod directories
        run: |
          set -euo pipefail
          mkdir -p /opt/kyvc/logs/prod/frontend
          mkdir -p /opt/kyvc/logs/prod/backend
          mkdir -p /opt/kyvc/logs/prod/core
          mkdir -p /opt/kyvc/logs/prod/back-admin
          mkdir -p /opt/kyvc/logs/prod/core-admin
          test -d /mnt/kyvc-prod

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy prod compose
        run: |
          set -euo pipefail
          docker compose \
            -f "$PROD_RUNTIME_COMPOSE_FILE" \
            pull
          docker compose \
            -f "$PROD_RUNTIME_COMPOSE_FILE" \
            up -d

      - name: Health check prod compose
        run: |
          set -euo pipefail
          curl -f -H "Host: kyvc.khuoo.synology.me" http://127.0.0.1:3000
          curl -f -H "Host: admin-kyvc.khuoo.synology.me" http://127.0.0.1:3000
          curl -f -H "Host: core-admin-kyvc.khuoo.synology.me" http://127.0.0.1:3000
          curl -f http://127.0.0.1:8080/health
          docker exec kyvc-core-prod sh -c "wget -qO- http://127.0.0.1:8090/health"
          docker exec kyvc-back-admin-prod sh -c "wget -qO- http://127.0.0.1:8080/health"
          docker exec kyvc-core-admin-prod sh -c "wget -qO- http://127.0.0.1:8091/health"
