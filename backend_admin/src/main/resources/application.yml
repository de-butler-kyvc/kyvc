spring:
  application:
    name: kyvc-backend-admin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/kyvc_backend_admin}"
    username: ${DB_USERNAME:kyvc}
    password: ${DB_PASSWORD:kyvc}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.kyvc.backendadmin: INFO
