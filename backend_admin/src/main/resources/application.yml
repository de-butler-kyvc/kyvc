spring:
  application:
    name: kyvc-backend-admin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kyvc_dev}
    username: ${DB_USER:kyvc_admin}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: ${KYVC_MAIL_HOST:smtp.gmail.com}
    port: ${KYVC_MAIL_PORT:587}
    username: ${KYVC_MAIL_USERNAME:}
    password: ${KYVC_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${KYVC_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${KYVC_MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.kyvc.backendadmin: INFO

kyvc:
  auth:
    mfa:
      expiration-minutes: ${KYVC_MFA_EXPIRATION_MINUTES:5}
      session-expiration-minutes: ${KYVC_MFA_SESSION_EXPIRATION_MINUTES:10}
      code-length: ${KYVC_MFA_CODE_LENGTH:6}
      max-failed-attempts: ${KYVC_MFA_MAX_FAILED_ATTEMPTS:5}
  mail:
    from: ${KYVC_MAIL_FROM:}
