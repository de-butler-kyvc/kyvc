spring:
  application:
    name: kyvc-backend-admin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kyvc_dev}
    username: ${DB_USER:kyvc_admin}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: ${KYVC_MAIL_HOST:smtp.gmail.com}
    port: ${KYVC_MAIL_PORT:587}
    username: ${KYVC_MAIL_USERNAME:}
    password: ${KYVC_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${KYVC_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${KYVC_MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.kyvc.backendadmin: INFO

kyvc:
  jwt:
    issuer: ${KYVC_JWT_ISSUER:kyvc-backend}
    secret: ${KYVC_JWT_SECRET:local-development-secret-key-must-be-changed}
    access-token-expiration-minutes: ${KYVC_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:30}
    refresh-token-expiration-days: ${KYVC_JWT_REFRESH_TOKEN_EXPIRATION_DAYS:14}
    access-cookie-name: ${KYVC_JWT_ACCESS_COOKIE_NAME:KYVC_ACCESS_TOKEN}
    refresh-cookie-name: ${KYVC_JWT_REFRESH_COOKIE_NAME:KYVC_REFRESH_TOKEN}
    secure-cookie: ${KYVC_JWT_SECURE_COOKIE:false}
    same-site: ${KYVC_JWT_SAME_SITE:Lax}
    cookie-path: ${KYVC_JWT_COOKIE_PATH:/}
  cors:
    allowed-origins: ${KYVC_CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-origin-patterns: ${KYVC_CORS_ALLOWED_ORIGIN_PATTERNS:}
    allow-credentials: ${KYVC_CORS_ALLOW_CREDENTIALS:true}
  auth:
    mfa:
      expiration-minutes: ${KYVC_MFA_EXPIRATION_MINUTES:5}
      session-expiration-minutes: ${KYVC_MFA_SESSION_EXPIRATION_MINUTES:10}
      code-length: ${KYVC_MFA_CODE_LENGTH:6}
      max-failed-attempts: ${KYVC_MFA_MAX_FAILED_ATTEMPTS:5}
  mail:
    from: ${KYVC_MAIL_FROM:}
