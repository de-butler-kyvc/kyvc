services:
  kyvc-frontend-dev:
    image: nginx:alpine
    container_name: kyvc-frontend-dev
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - /opt/kyvc/logs/dev/frontend:/var/log/nginx
    networks:
      - kyvc-public

  kyvc-backend-dev:
    image: ghcr.io/de-butler-kyvc/kyvc-backend:dev
    container_name: kyvc-backend-dev
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_STORAGE_PATH: ${APP_STORAGE_PATH}
      LOG_PATH: ${LOG_PATH}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED}
      CORE_BASE_URL: ${CORE_BASE_URL}
    volumes:
      - /mnt/kyvc-dev:/app/storage
      - /opt/kyvc/logs/dev/backend:/app/logs
    networks:
      - kyvc-public
      - kyvc-internal
      - kyvc-dev-net

  kyvc-core-dev:
    image: ghcr.io/de-butler-kyvc/kyvc-core:dev
    container_name: kyvc-core-dev
    restart: unless-stopped
    expose:
      - "8090"
    environment:
      APP_ENV: ${APP_ENV}
      ENV: ${ENV}
      LOG_PATH: ${LOG_PATH}
      LOG_LEVEL: ${LOG_LEVEL}
      DB_HOST: ${CORE_DB_HOST}
      DB_PORT: ${CORE_DB_PORT}
      DB_NAME: ${CORE_DB_NAME}
      DB_USER: ${CORE_DB_USER}
      DB_PASSWORD: ${CORE_DB_PASSWORD}
    volumes:
      - /opt/kyvc/logs/dev/core:/app/logs
    networks:
      - kyvc-internal
      - kyvc-dev-net

  kyvc-admin-frontend-dev:
    image: nginx:alpine
    container_name: kyvc-admin-frontend-dev
    restart: unless-stopped
    ports:
      - "3003:80"
    volumes:
      - /opt/kyvc/logs/dev/admin-frontend:/var/log/nginx
    networks:
      - kyvc-public
      - kyvc-admin-internal

  kyvc-back-admin-dev:
    image: ghcr.io/de-butler-kyvc/kyvc-backend-admin:dev
    container_name: kyvc-back-admin-dev
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_STORAGE_PATH: ${APP_STORAGE_PATH}
      LOG_PATH: ${LOG_PATH}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED}
      SERVICE_LOG_PATH: ${SERVICE_LOG_PATH}
      CORE_ADMIN_BASE_URL: ${CORE_ADMIN_BASE_URL}
    volumes:
      - /opt/kyvc/logs/dev/back-admin:/app/logs
      - /opt/kyvc/logs/dev:/app/service-logs:ro
    networks:
      - kyvc-admin-internal
      - kyvc-dev-net

  kyvc-core-admin-dev:
    image: ghcr.io/de-butler-kyvc/kyvc-core-admin:dev
    container_name: kyvc-core-admin-dev
    restart: unless-stopped
    expose:
      - "8091"
    environment:
      APP_ENV: ${APP_ENV}
      ENV: ${ENV}
      LOG_PATH: ${LOG_PATH}
      LOG_LEVEL: ${LOG_LEVEL}
      DB_HOST: ${CORE_DB_HOST}
      DB_PORT: ${CORE_DB_PORT}
      DB_NAME: ${CORE_DB_NAME}
      DB_USER: ${CORE_DB_USER}
      DB_PASSWORD: ${CORE_DB_PASSWORD}
    volumes:
      - /opt/kyvc/logs/dev/core-admin:/app/logs
    networks:
      - kyvc-admin-internal
      - kyvc-dev-net

networks:
  kyvc-public:
    external: true
  kyvc-internal:
    external: true
  kyvc-admin-internal:
    external: true
  kyvc-dev-net:
    external: true
