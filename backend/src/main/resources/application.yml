spring:
  application:
    name: kyvc-backend
  threads:
    virtual:
      enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kyvc_dev}
    username: ${DB_USER:kyvc_admin}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: ${KYVC_MAIL_HOST:smtp.gmail.com}
    port: ${KYVC_MAIL_PORT:587}
    username: ${KYVC_MAIL_USERNAME:}
    password: ${KYVC_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${KYVC_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${KYVC_MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.kyvc.backend: INFO

kyvc:
  jwt:
    issuer: ${KYVC_JWT_ISSUER:kyvc-backend}
    secret: ${KYVC_JWT_SECRET:local-development-secret-key-must-be-changed}
    access-token-expiration-minutes: ${KYVC_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:30}
    refresh-token-expiration-days: ${KYVC_JWT_REFRESH_TOKEN_EXPIRATION_DAYS:14}
    access-cookie-name: ${KYVC_JWT_ACCESS_COOKIE_NAME:KYVC_ACCESS_TOKEN}
    refresh-cookie-name: ${KYVC_JWT_REFRESH_COOKIE_NAME:KYVC_REFRESH_TOKEN}
    secure-cookie: ${KYVC_JWT_SECURE_COOKIE:false}
    same-site: ${KYVC_JWT_SAME_SITE:Lax}
    cookie-path: ${KYVC_JWT_COOKIE_PATH:/}
  cors:
    allowed-origins: ${KYVC_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    allowed-origin-patterns: ${KYVC_CORS_ALLOWED_ORIGIN_PATTERNS:}
  dev-token:
    enabled: ${KYVC_DEV_TOKEN_ENABLED:false}
    auto-create-user: ${KYVC_DEV_TOKEN_AUTO_CREATE_USER:true}
    default-email: ${KYVC_DEV_TOKEN_DEFAULT_EMAIL:dev-corporate-user@kyvc.local}
  auth:
    mfa:
      expiration-minutes: ${KYVC_MFA_EXPIRATION_MINUTES:5}
      session-expiration-minutes: ${KYVC_MFA_SESSION_EXPIRATION_MINUTES:10}
      code-length: ${KYVC_MFA_CODE_LENGTH:6}
      max-failed-attempts: ${KYVC_MFA_MAX_FAILED_ATTEMPTS:5}
    password-reset:
      expiration-minutes: ${KYVC_PASSWORD_RESET_EXPIRATION_MINUTES:30}
      base-url: ${KYVC_PASSWORD_RESET_BASE_URL:}
  document:
    preview:
      expiration-minutes: ${KYVC_DOCUMENT_PREVIEW_EXPIRATION_MINUTES:10}
  notification:
    default-page-size: ${KYVC_NOTIFICATION_DEFAULT_PAGE_SIZE:20}
    max-page-size: ${KYVC_NOTIFICATION_MAX_PAGE_SIZE:100}
  mail:
    from: ${KYVC_MAIL_FROM:}
  core:
    mode: ${KYVC_CORE_MODE:mock}
    base-url: ${KYVC_CORE_BASE_URL:https://dev-core-kyvc.khuoo.synology.me}
    connect-timeout-millis: ${KYVC_CORE_CONNECT_TIMEOUT_MILLIS:3000}
    read-timeout-millis: ${KYVC_CORE_READ_TIMEOUT_MILLIS:10000}
    dev-seed-enabled: ${KYVC_CORE_DEV_SEED_ENABLED:false}
    failure-fallback-enabled: ${KYVC_CORE_FAILURE_FALLBACK_ENABLED:false}
    api-key: ${KYVC_CORE_API_KEY:}
