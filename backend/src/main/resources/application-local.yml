spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kyvc_dev}
    username: ${DB_USER:kyvc_admin}
    password: ${DB_PASSWORD}
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: INFO
    com.kyvc.backend: DEBUG
