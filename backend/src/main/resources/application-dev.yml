spring:
  config:
    activate:
      on-profile: dev
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
  jpa:
    show-sql: false

logging:
  level:
    com.kyvc.backend: DEBUG

kyvc:
  jwt:
    issuer: ${KYVC_JWT_ISSUER:kyvc-backend}
    secret: ${KYVC_JWT_SECRET:local-development-secret-key-must-be-changed}
    access-token-expiration-minutes: ${KYVC_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:30}
    refresh-token-expiration-days: ${KYVC_JWT_REFRESH_TOKEN_EXPIRATION_DAYS:14}
    access-cookie-name: ${KYVC_JWT_ACCESS_COOKIE_NAME:KYVC_ACCESS_TOKEN}
    refresh-cookie-name: ${KYVC_JWT_REFRESH_COOKIE_NAME:KYVC_REFRESH_TOKEN}
    secure-cookie: ${KYVC_JWT_SECURE_COOKIE:false}
    same-site: ${KYVC_JWT_SAME_SITE:Lax}
    cookie-path: ${KYVC_JWT_COOKIE_PATH:/}
  cors:
    allowed-origins: ${KYVC_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  dev-token:
    enabled: ${KYVC_DEV_TOKEN_ENABLED:false}
    auto-create-user: ${KYVC_DEV_TOKEN_AUTO_CREATE_USER:true}
    default-email: ${KYVC_DEV_TOKEN_DEFAULT_EMAIL:dev-corporate-user@kyvc.local}
